name: Build and Release Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Lint Extension
        run: |
          npx web-ext lint --source-dir . --output-format json > lint-results.json || true
          cat lint-results.json

      - name: Build ZIP for sideloading (Load Unpacked)
        run: |
          mkdir -p dist

          # Build a clean ZIP with only the extension files
          zip -r dist/nehboro-${{ steps.version.outputs.VERSION }}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "dist/*" \
            -x "dist-manual/*" \
            -x "scratch/*" \
            -x "_metadata/*" \
            -x "node_modules/*" \
            -x "lint-results.json" \
            -x "*.pem" \
            -x ".gitignore" \
            -x "{content,popup,blocked,utils,icons,rules}/*"

          cp dist/nehboro-${{ steps.version.outputs.VERSION }}.zip dist/nehboro-latest.zip

          echo "Built ZIP:"
          ls -lh dist/

      - name: Build CRX
        run: |
          # Use secret PEM if available, otherwise generate a temporary key
          if [ -n "${{ secrets.CHROME_EXTENSION_PEM }}" ]; then
            echo "${{ secrets.CHROME_EXTENSION_PEM }}" > ./dist/key.pem
          else
            echo "No CHROME_EXTENSION_PEM secret — generating temporary key"
            npx crx keygen .
            mv key.pem ./dist/key.pem
          fi

          # Unzip into a clean folder and pack as CRX
          mkdir -p crx-temp
          unzip -o dist/nehboro-${{ steps.version.outputs.VERSION }}.zip -d crx-temp
          npx crx pack crx-temp -p ./dist/key.pem -o ./dist/nehboro-${{ steps.version.outputs.VERSION }}.crx
          cp dist/nehboro-${{ steps.version.outputs.VERSION }}.crx dist/nehboro-latest.crx

          # Clean up key
          rm -f ./dist/key.pem

          echo "Built CRX:"
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nehboro-extension
          path: |
            dist/nehboro-*.zip
            dist/nehboro-*.crx

      # --- Release (only on push to main, not PRs) ---

      - name: Create or update GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Check if release exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating assets..."

            # Delete old ZIP assets to replace them
            for asset in $(gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null); do
              echo "  Deleting old asset: $asset"
              gh release delete-asset "$TAG" "$asset" --yes 2>/dev/null || true
            done

            # Upload new assets
            gh release upload "$TAG" \
              dist/nehboro-${VERSION}.zip \
              dist/nehboro-latest.zip \
              dist/nehboro-${VERSION}.crx \
              dist/nehboro-latest.crx \
              --clobber

            echo "✓ Updated release $TAG"
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" \
              dist/nehboro-${VERSION}.zip \
              dist/nehboro-latest.zip \
              dist/nehboro-${VERSION}.crx \
              dist/nehboro-latest.crx \
              --title "Nehboro $TAG" \
              --generate-notes

            echo "✓ Created release $TAG"
          fi

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged extension
        uses: actions/download-artifact@v8.0.1
        with:
          name: nehboro-extension
          path: ./dist

      - name: Upload to Chrome Web Store
        if: env.HAS_SECRETS == 'true'
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: dist/nehboro-latest.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
        env:
          HAS_SECRETS: ${{ secrets.CHROME_EXTENSION_ID != '' && secrets.CHROME_CLIENT_ID != '' }}
